<!-- PDF embed

https://github.com/BookStackApp/BookStack/issues/705#issuecomment-1878480380

IMPORTANT FIXES APPLIED:
- Uses URL as text content inside <p> tag instead of data attributes (attributes get stripped by BookStack WYSIWYG sanitization)
- Updated pdf.js from v2 to v3 (3.11.174) - required for modern browsers
- Added pdfjsLib.GlobalWorkerOptions.workerSrc for pdf.js v3+
- Changed getViewport() API: page.getViewport({scale: 1.5}) instead of page.getViewport(1.5)
- Changed .then() to .promise.then() for pdf.js v3+ API
- Added loading placeholder with spinner animation
- Added visual styling for the PDF container

CORS: The PDF URL must point to a server that allows cross-origin requests.
- PDFs hosted on the SAME domain as BookStack will work fine
- External PDFs (Google Drive, W3C, etc.) might be blocked by the browser
- Solution: Upload the PDF as a BookStack attachment and use that URL

-->


<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
.pdf-embed {
  margin: 1rem 0;
  min-height: 200px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 0.5rem;
}

.pdf-embed.pdf-loading {
  background-color: #f0f0f0;
  border: 2px dashed #ccc;
  border-radius: 8px;
  min-height: 150px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0.5rem;
}

.pdf-embed.pdf-loading::before {
  content: "Loading PDF...";
  color: #666;
  font-size: 0.9rem;
}

.pdf-embed.pdf-loading::after {
  content: "";
  width: 24px;
  height: 24px;
  border: 3px solid #ccc;
  border-top-color: #39f;
  border-radius: 50%;
  animation: pdf-spin 1s linear infinite;
}

@keyframes pdf-spin {
  to { transform: rotate(360deg); }
}

.pdf-embed canvas {
  background-color: #f5f5f5;
  width: 100%;
  display: block;
  margin-bottom: 0;
}

.pdf-embed hr {
  margin: 0;
  border: none;
  border-top: 1px solid #ddd;
}

.page-content a {
  text-decoration: underline;
}

.pdf-wrapper {
  position: relative;
  height: 80vh;
  width: 100%;
}

.pdf-wrapper .download-link {
  position: absolute;
  top: -2em; 
  right: 0;
  z-index: 50;
}

.pdf-wrapper .pdf-scroller {
  height: 100%;
  overflow: auto;
}

.pdf-error {
  color: #721c24;
  background-color: #f8d7da;
  border: 1px solid #f5c6cb;
  border-radius: 4px;
  padding: 1rem;
  margin: 1rem 0;
}
</style>
<script type="text/javascript">

  function addPdfEmbedButtonToSidebar(attachmentLinkBtn) {
    if (!attachmentLinkBtn) return;

    // Find the parent card and check if the attached file is a PDF
    const cardDiv = attachmentLinkBtn.closest('[component="ajax-delete-row"]');
    if (!cardDiv) return;
    const fileName = cardDiv.querySelector('.py-s a')?.textContent || '';
    if (!fileName.toLowerCase().endsWith('.pdf')) return;

    const pdfEmbedBtn = document.createElement('button');
    pdfEmbedBtn.type = 'button';
    pdfEmbedBtn.title = 'Embed PDF on Cursor';
    pdfEmbedBtn.className = 'drag-card-action text-center text-link';
    pdfEmbedBtn.innerHTML = '<svg class="svg-icon" data-icon="file-pdf" role="presentation" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="none" d="M0 0h24v24H0z"/><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2m-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5zm3-1.5h-1v1h-1v-1h-1v-1h1v-1h1v1h1zM9 9.5h1v-1H9zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4zm10 5.5h1v-3h-1z"/></svg>';

    pdfEmbedBtn.addEventListener('click', function() {
      const pdfUrl = cardDiv.getAttribute('option:ajax-delete-row:url');
      if (pdfUrl && pdfUrl.trim()) {
        // Try to insert into the active TinyMCE editor if available
        if (typeof tinymce !== 'undefined') {
          const editor = tinymce.activeEditor;
          if (editor) {
            editor.insertContent('<p class="pdf-embed">' + pdfUrl.trim() + '</p>');
            return;
          }
        }
        // Fallback for markdown editor: insert [pdf](url) at cursor position
        const mdText = '[pdf](' + pdfUrl.trim() + ')';

        // CodeMirror 6
        if (window.mdEditorView) {
          const view = window.mdEditorView;
          const sel = view.state.selection.main;
          view.dispatch(view.state.update({
            changes: { from: sel.from, to: sel.to, insert: mdText }
          }));
          view.focus();
          return;
        }
      }
    });

    attachmentLinkBtn.parentNode.insertBefore(pdfEmbedBtn, attachmentLinkBtn);
  }

  function addPdfEmbedButtonsToAttachmentsPdf() {
    const attachmentLinkBtns = document.querySelectorAll('button[title="Add Attachment Link to Page"]');
    attachmentLinkBtns.forEach(addPdfEmbedButtonToSidebar);
  }

  // Set pdf.js worker (required for v3+)
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ------------------- THIS SECTION ADDS A PDF BUTTON TO THE EDITOR TOOLBAR THAT ALLOWS YOU TO EMBED PDFS 

  // Use BookStack editor event to add custom "Insert PDF" button into main toolbar
  window.addEventListener('editor-tinymce::pre-init', event => {
      const mceConfig = event.detail.config;
      mceConfig.toolbar = mceConfig.toolbar.replace('link', 'link insertpdf')
  });

  // Use BookStack editor event to define the custom "Insert PDF" button.
  window.addEventListener('editor-tinymce::setup', event => {
    const editor = event.detail.editor;

    // Add PDF insert button
    editor.ui.registry.addButton('insertpdf', {
      tooltip: 'Insert PDF',
      icon: 'document-properties',
      onAction() {
        editor.windowManager.open({
          title: 'Insert PDF',
          body: {
            type: 'panel',
            items: [
              {type: 'textarea', name: 'pdfurl', label: 'PDF URL'}
            ]
          },
          onSubmit: function(e) {
            // Insert URL as text content (attributes get stripped by BookStack sanitization)
            editor.insertContent('<p class="pdf-embed">' + e.getData().pdfurl + '</p>');
            e.close();
          },
          buttons: [
            {
              type: 'submit',
              text: 'Insert PDF'
            }
          ]
        });
      }
    });

  });

//-------------------- THE CODE BELOW SHALL BE ACTIVE IN VIEWING MODE TO EMBED PDFS
function renderPdf(el) {
  var url = el.textContent.trim();
  if (!url || el.classList.contains('rendered') || !url.startsWith('http')) return;
  el.classList.add('rendered');
  el.textContent = '';
  
  // Show loading placeholder
  el.classList.add('pdf-loading');
  
  // Create canvas
  let canvas = document.createElement('canvas');
  canvas.dataset.pdfurl = url;
  el.appendChild(canvas);
  
  // Create wrapper
  var wrapper = document.createElement('div');
  wrapper.className = 'pdf-wrapper';
  var scroller = document.createElement('div');
  scroller.className = 'pdf-scroller';
  wrapper.appendChild(scroller);
  el.insertBefore(wrapper, canvas);
  scroller.appendChild(canvas);

  // Download link
  var downloadLink = document.createElement('a');
  downloadLink.href = url;
  downloadLink.className = 'download-link';
  downloadLink.innerText = 'Download PDF';
  el.appendChild(downloadLink);
  
  let pdf = null;
  let currentPage = 1;
  
  function renderPage(page) {
    // FIXED: Pass object to getViewport instead of just a number (required for pdf.js v3+)
    const scale = 1.5;
    const viewport = page.getViewport({scale: scale});
    
    const context = canvas.getContext('2d');
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    canvas.style.maxWidth = '100%';
    
    const renderContext = {
      canvasContext: context,
      viewport: viewport
    };
    
    // Render and wait for completion
    page.render(renderContext).promise.then(function() {
          // Remove loading placeholder
          el.classList.remove('pdf-loading');
      
          if (currentPage < pdf.numPages) {
        currentPage++;
        let newCanvas = document.createElement('canvas');
        newCanvas.dataset.pdfurl = url;
        scroller.insertBefore(newCanvas, canvas.nextSibling);
        scroller.insertBefore(document.createElement('hr'), canvas.nextSibling);
        canvas = newCanvas;
        pdf.getPage(currentPage).then(renderPage);
      }
    }).catch(function(error) {
      console.error('Error rendering page:', error);
    });
  }
  
  pdfjsLib.getDocument(url).promise
    .then(function(pdfDoc) {
      pdf = pdfDoc;
      return pdf.getPage(1);
    })
    .then(renderPage)
    .catch(function(error) {
      console.error('Error loading PDF:', error);
      el.classList.remove('pdf-loading');
      el.innerHTML = '<div class="pdf-error">Error loading PDF: ' + error.message + '</div>';
    });
}


window.addEventListener('DOMContentLoaded', function() {
  addPdfEmbedButtonsToAttachmentsPdf();
  // Pre-process Markdown Links
  // Finds links rendered from markdown like [pdf](https://...) and transforms them into embed containers
  document.querySelectorAll('.page-content a').forEach(function(link) {
    let linkText = link.textContent.trim().toLowerCase();
    
    if (linkText === 'pdf' || linkText === 'embed-pdf') {
      let embedContainer = document.createElement('p');
      embedContainer.className = 'pdf-embed';
      embedContainer.textContent = link.href; // Extract the URL
      link.parentNode.replaceChild(embedContainer, link);
    }
  });

  // Render all PDF containers (Handles both WYSIWYG and transformed Markdown)
  document.querySelectorAll('.pdf-embed').forEach(renderPdf);
});
</script>
