<!-- Page Preview - Click on the eye to preview page -->
<!-- Credit: https://github.com/florinm03 -->

<style>
    .page-preview-container {
        position: relative;
        border: 1px solid var(--color-border);
        border-radius: 6px;
        background: var(--color-page-content);

        margin-top: 8px;
        margin-left: 12px;
        margin-right: 8px;
        margin-bottom: 1rem;

        display: flex;
        flex-direction: column;
        transition: border-color 0.2s ease, outline 0.2s ease, box-shadow 0.2s ease;
    }

    .page-preview-container:has(.custom-page-preview.is-open) {
        outline: 2px dashed var(--color-primary);
        outline-offset: 4px;
    }

    .page-preview-container:has(.custom-page-preview.is-open):hover {
        outline-style: solid;
    }

    .page-preview-container .entity-list-item {
        position: relative;
        border: none;
        margin-bottom: 0;
        background: var(--color-lighter);
        border-radius: 6px;
        padding: 12px 16px;
        padding-right: 50px;
        transition: border-radius 0.2s;
    }

    html.dark-mode .page-preview-container .entity-list-item {
        background: rgba(0, 0, 0, 0.2);
    }

    .page-preview-container .entity-item-snippet { display: none; }

    .custom-page-preview {
        display: none;
        position: relative;
        max-height: 350px;
        overflow-y: auto;
        color: var(--color-text);
        font-size: 0.85em;
        border-top: 1px solid var(--color-border);
    }

    .custom-page-preview.is-open {
        display: block;
    }

    .page-preview-container:has(.custom-page-preview.is-open) .entity-list-item {
        border-radius: 6px 6px 0 0;
    }

    .custom-page-preview .preview-inner { padding: 16px; }

    .custom-page-preview h1 { font-size: 1.4em !important; margin-top: 0; margin-bottom: 10px; }
    .custom-page-preview h2 { font-size: 1.2em !important; margin-top: 10px; margin-bottom: 8px; }
    .custom-page-preview h3 { font-size: 1.1em !important; margin-top: 10px; margin-bottom: 8px; }
    .custom-page-preview h4, .custom-page-preview h5 { font-size: 1em !important; }
    .custom-page-preview img, .custom-page-preview iframe { max-width: 100%; height: auto; }

    .custom-page-preview::-webkit-scrollbar { width: 8px; }
    .custom-page-preview::-webkit-scrollbar-track { background: transparent; }
    .custom-page-preview::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }
    .custom-page-preview::-webkit-scrollbar-thumb:hover { background: var(--color-primary); }
    html.dark-mode .custom-page-preview::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); }
    html.dark-mode .custom-page-preview::-webkit-scrollbar-thumb:hover { background: var(--color-primary); }

    .page-preview-actions {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
        display: flex;
        gap: 8px;
    }

    .quick-view-btn {
        background: transparent;
        border: 1px solid var(--color-border);
        border-radius: 4px;
        color: var(--color-text-muted);
        cursor: pointer;
        padding: 4px 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        opacity: 0;
        visibility: hidden;
    }

    .page-preview-container:not(:has(.custom-page-preview.is-open)):hover .quick-view-btn {
        opacity: 1;
        visibility: visible;
    }

    .page-preview-container:has(.custom-page-preview.is-open) .quick-view-btn {
        opacity: 1;
        visibility: visible;
    }

    .quick-view-btn:hover {
        color: var(--color-primary);
        border-color: var(--color-primary);
        background: var(--color-lighter);
    }
    .quick-view-btn svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
        pointer-events: none;
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const pageLinks = document.querySelectorAll('.book-contents a.entity-list-item[data-entity-type="page"]');
        if (pageLinks.length === 0) return;

        const iconEye = `<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>`;
        const iconEyeOff = `<svg viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>`;

        // Expose helpers so add-on scripts (e.g. edit-pages-addon.html) can reuse them.
        window.BookStackPagePreview = {
            iconEye,
            iconEyeOff,
            loadPreview,
        };

        function loadPreview(url, previewDiv) {
            previewDiv.innerHTML = '<div class="preview-inner text-muted">Loading...</div>';
            fetch(url)
                .then(response => response.text())
                .then(html => {
                    const doc = new DOMParser().parseFromString(html, 'text/html');
                    const pageContent = doc.querySelector('.page-content');
                    if (pageContent) {
                        pageContent.querySelectorAll('script').forEach(s => s.remove());
                        previewDiv.innerHTML = `<div class="preview-inner">${pageContent.innerHTML}</div>`;
                    } else {
                        previewDiv.innerHTML = '<div class="preview-inner text-muted">Preview unavailable.</div>';
                    }
                }).catch(() => {
                    previewDiv.innerHTML = '<div class="preview-inner text-muted">Failed to load preview.</div>';
                });
        }

        pageLinks.forEach(link => {
            const url = link.href;

            const container = document.createElement('div');
            container.className = 'page-preview-container';
            link.parentNode.insertBefore(container, link);
            container.appendChild(link);

            const previewDiv = document.createElement('div');
            previewDiv.className = 'custom-page-preview';
            container.appendChild(previewDiv);

            const actionsWrapper = document.createElement('div');
            actionsWrapper.className = 'page-preview-actions';

            const viewBtn = document.createElement('button');
            viewBtn.className = 'quick-view-btn title-action print-hidden';
            viewBtn.title = "Show Preview";
            viewBtn.innerHTML = iconEye;
            actionsWrapper.appendChild(viewBtn);
            link.appendChild(actionsWrapper);

            // Per-container state, exposed for add-ons.
            const state = { hasLoadedPreview: false, isEditing: false };
            container._previewState = state;
            container._previewUrl = url;
            container._previewDiv = previewDiv;
            container._viewBtn = viewBtn;

            viewBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();

                const isOpen = previewDiv.classList.contains('is-open');

                if (isOpen) {
                    // Prevent closing if currently editing
                    if (state.isEditing) {
                        alert('Please save or cancel your changes before closing the preview.');
                        return;
                    }
                    
                    previewDiv.classList.remove('is-open');
                    viewBtn.innerHTML = iconEye;
                    viewBtn.title = "Show Preview";
                } else {
                    previewDiv.classList.add('is-open');
                    viewBtn.innerHTML = iconEyeOff;
                    viewBtn.title = "Hide Preview";

                    if (!state.hasLoadedPreview && !state.isEditing) {
                        loadPreview(url, previewDiv);
                        state.hasLoadedPreview = true;
                    }
                }
            });


            container.dispatchEvent(new CustomEvent('preview-container-ready', { bubbles: true }));
        });


        document.dispatchEvent(new CustomEvent('preview-pages-ready'));
    });
</script>
